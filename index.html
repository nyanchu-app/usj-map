<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>USJ 待ち合わせナビ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8341C;--gold:#FFD700;--dark:#080c1a;
  --border:rgba(255,255,255,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--dark);color:#fff;font-family:'Noto Sans JP',sans-serif;min-height:100vh}

/* ===== スプラッシュ ===== */
#splash{
  position:fixed;inset:0;z-index:9999;
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  transition:opacity .8s ease,transform .8s ease;
}
#splash.gone{opacity:0;transform:scale(1.08);pointer-events:none}

/* 夜の空グラデ背景 */
.sp-bg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#0a1628 0%,#0d2044 35%,#1a1035 65%,#0a0a18 100%);
}
/* 星のきらめき */
.sp-stars{position:absolute;inset:0}
.sp-star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle 2s ease-in-out infinite;
}
.sp-star:nth-child(1){width:2px;height:2px;top:15%;left:20%;animation-delay:0s}
.sp-star:nth-child(2){width:3px;height:3px;top:25%;left:75%;animation-delay:.4s}
.sp-star:nth-child(3){width:2px;height:2px;top:10%;left:50%;animation-delay:.8s}
.sp-star:nth-child(4){width:2px;height:2px;top:35%;left:15%;animation-delay:1.2s}
.sp-star:nth-child(5){width:3px;height:3px;top:20%;left:88%;animation-delay:.6s}
.sp-star:nth-child(6){width:2px;height:2px;top:8%;left:35%;animation-delay:1s}
.sp-star:nth-child(7){width:2px;height:2px;top:30%;left:60%;animation-delay:.3s}
.sp-star:nth-child(8){width:3px;height:3px;top:18%;left:42%;animation-delay:1.5s}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* 下部の光の地平線 */
.sp-horizon{
  position:absolute;bottom:0;left:0;right:0;height:45%;
  background:radial-gradient(ellipse at 50% 100%,rgba(255,180,30,.18) 0%,rgba(255,120,0,.08) 40%,transparent 70%);
}

/* 花火パーティクル */
.sp-firework{
  position:absolute;width:6px;height:6px;border-radius:50%;
  animation:firework 1.2s ease-out forwards;
  opacity:0;
}
.sp-firework:nth-child(1){background:#FFD700;top:20%;left:15%;animation-delay:.5s}
.sp-firework:nth-child(2){background:#ff6b9d;top:15%;left:80%;animation-delay:.8s}
.sp-firework:nth-child(3){background:#64b5f6;top:25%;left:45%;animation-delay:1.1s}
.sp-firework:nth-child(4){background:#FFD700;top:12%;left:65%;animation-delay:.6s}
.sp-firework:nth-child(5){background:#a78bfa;top:22%;left:30%;animation-delay:.9s}
@keyframes firework{
  0%{opacity:1;transform:scale(0)}
  50%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(2.5);box-shadow:0 0 12px currentColor}
}

/* コンテンツ */
.sp-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px}

.sp-deco{
  font-size:11px;letter-spacing:6px;
  color:rgba(255,215,0,.6);
  font-family:'Bebas Neue',cursive;
  animation:spFadeUp .6s .1s both;
}

/* USJロゴ：白文字・金枠 */
.sp-badge{
  font-family:'Bebas Neue',cursive;font-size:96px;letter-spacing:10px;
  color:#fff;
  padding:10px 36px 8px;
  border-radius:16px;
  border:3px solid rgba(255,215,0,.7);
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(4px);
  box-shadow:
    0 0 40px rgba(255,215,0,.2),
    0 0 80px rgba(255,215,0,.08),
    inset 0 1px 0 rgba(255,255,255,.2);
  animation:spBadge .9s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;overflow:hidden;
  text-shadow:0 0 30px rgba(255,215,0,.4);
}
.sp-badge::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  animation:shine 1.8s .9s ease forwards;
}
@keyframes shine{to{left:150%}}

/* 区切り */
.sp-divider{
  display:flex;align-items:center;gap:12px;
  animation:spFadeUp .5s .45s both;
}
.sp-divider-line{width:55px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.5))}
.sp-divider-line.r{background:linear-gradient(90deg,rgba(255,215,0,.5),transparent)}
.sp-divider-icon{font-size:14px;animation:spinStar 3s linear infinite}
@keyframes spinStar{to{transform:rotate(360deg)}}

.sp-sub{
  font-size:16px;letter-spacing:5px;color:rgba(255,255,255,.8);
  font-family:'Bebas Neue',cursive;
  animation:spFadeUp .6s .55s both;
}
.sp-sub2{
  font-size:10px;letter-spacing:4px;color:rgba(255,215,0,.45);
  animation:spFadeUp .6s .7s both;
  margin-top:-6px;
}

/* プログレスバー */
.sp-progress{
  width:140px;height:2px;
  background:rgba(255,255,255,.1);
  border-radius:2px;overflow:hidden;
  margin-top:4px;
  animation:spFadeUp .5s .75s both;
}
.sp-prog-fill{
  height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,rgba(255,215,0,.6),rgba(255,215,0,1));
  animation:fillProg 1.8s .75s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes fillProg{to{width:100%}}
@keyframes spFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spBadge{from{opacity:0;transform:scale(.45) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ===== ヘッダー ===== */
header{
  background:linear-gradient(180deg,#0a0a0a 0%,#111 100%);
  border-bottom:2px solid var(--red);
  box-shadow:0 2px 24px rgba(232,52,28,0.35);
  position:sticky;top:0;z-index:200;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.h-left{display:flex;align-items:center;gap:10px}
.h-badge{
  background:linear-gradient(145deg,#1a2a4a,#0d1a30);
  font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:3px;
  padding:2px 12px 3px;border-radius:6px;
  border:2px solid rgba(255,215,0,.7);
  color:#fff;
  box-shadow:0 0 16px rgba(255,215,0,.2),inset 0 1px 0 rgba(255,255,255,.15);
  text-shadow:0 0 12px rgba(255,215,0,.4);
}
.h-title{line-height:1.3}
.h-title strong{font-size:14px;font-weight:900;display:block}
.h-title span{font-size:10px;color:rgba(255,255,255,0.5)}
.h-pin{font-size:26px;animation:floatPin 2.5s ease-in-out infinite}
@keyframes floatPin{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-5px) rotate(5deg)}}

/* ===== マップ ===== */
.map-wrap{
  margin:8px 5px 0;border-radius:18px;overflow:hidden;
  border:1.5px solid rgba(255,215,0,0.2);
  box-shadow:0 8px 40px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.05);
  position:relative;
}
.map-wrap svg{width:100%;height:auto;display:block}

/* パーティクルキャンバス */
#fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

.hint{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.75);color:rgba(255,255,255,0.75);
  font-size:11px;padding:5px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.15);white-space:nowrap;
  backdrop-filter:blur(6px);transition:opacity 0.5s;pointer-events:none;
}
.hint.hide{opacity:0}

.blk{cursor:pointer;transition:transform .4s cubic-bezier(.34,1.56,.64,1),filter .3s}
.blk .top{transition:filter .3s}
.blk:active{transform:scale(.93) translateY(4px)!important;transition:transform .1s}
.blk:not(.sel){
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
  transform:translateY(0) scale(1);
}
.blk.sel{
  transform:translateY(-9px) scale(1.04);
  filter:drop-shadow(0 12px 20px rgba(0,0,0,.8)) drop-shadow(0 4px 10px rgba(0,0,0,.4));
}
.blk.sel .top{
  stroke:var(--gold)!important;stroke-width:3!important;
  filter:drop-shadow(0 0 20px rgba(255,215,0,1)) drop-shadow(0 0 10px rgba(255,215,0,.6));
}
.blk:not(.sel):not(:active){
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5)) brightness(.85);
}

/* ===== パネル ===== */
.panel{
  margin:8px 5px 20px;
  background:linear-gradient(160deg,rgba(12,16,32,0.98),rgba(8,10,24,0.98));
  border-radius:22px;border:1px solid rgba(255,255,255,0.1);
  overflow:hidden;display:none;
  box-shadow:0 12px 48px rgba(0,0,0,0.8);
}
.panel.show{display:block;animation:panelUp 0.35s cubic-bezier(0.34,1.2,0.64,1)}
@keyframes panelUp{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}

/* パネルバナー */
.p-banner{
  padding:18px 16px;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.p-banner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--ac,#333) 0%,transparent 65%);
  opacity:0.3;
}
.p-banner::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--ac,#fff),transparent);
  opacity:0.3;
}
.p-ico{
  width:58px;height:58px;border-radius:16px;font-size:30px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
  position:relative;z-index:1;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.p-txt{position:relative;z-index:1}
.p-name{font-size:17px;font-weight:900;line-height:1.35;text-shadow:0 1px 6px rgba(0,0,0,0.6)}
.p-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px}

/* スポット */
.sp-wrap{padding:14px 16px 0}
.sp-ttl{
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:rgba(255,255,255,0.4);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.sp-ttl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
.spots{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.spot{
  padding:9px 16px;border-radius:24px;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.05);
  font-size:14px;cursor:pointer;color:rgba(255,255,255,0.75);
  font-family:'Noto Sans JP',sans-serif;
  transition:all 0.2s;
}
.spot:active{transform:scale(0.94)}
.spot.on{font-weight:700;color:#fff}

/* メッセージ */
.msg-wrap{padding:0 16px 16px}
.msg-ttl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.msg-ttl{font-size:11px;letter-spacing:1.5px;color:rgba(255,255,255,0.35);font-weight:700}
.edit-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:12px;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.edit-btn.on{background:rgba(255,215,0,.2);border-color:rgba(255,215,0,.5);color:#FFD700}
.msg{
  background:rgba(255,255,255,0.04);border-radius:14px;
  padding:14px 16px;font-size:14px;line-height:1.9;
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.8);white-space:pre-wrap;
  width:100%;resize:none;min-height:160px;
  font-family:'Noto Sans JP',sans-serif;
  outline:none;-webkit-appearance:none;display:block;
}
.msg:not([readonly]){background:rgba(255,255,255,.08);border-color:rgba(255,215,0,.4);caret-color:#FFD700}

/* ボタン */
.btn-wrap{padding:0 16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{
  padding:16px 8px;border:none;border-radius:16px;
  font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:transform 0.15s,box-shadow 0.15s;
  position:relative;overflow:hidden;letter-spacing:0.5px;
}
.btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:rgba(255,255,255,0.12);border-radius:inherit;
}
.btn:active{transform:scale(0.95)}
.btn-line{background:linear-gradient(160deg,#12d64e,#06C755);color:#fff;box-shadow:0 4px 20px rgba(6,199,85,0.35)}
.btn-copy{background:linear-gradient(160deg,#7289ff,#5865F2);color:#fff;box-shadow:0 4px 20px rgba(88,101,242,0.35)}

/* トースト */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(15,15,25,0.95);color:#fff;
  padding:13px 26px;border-radius:28px;font-size:14px;
  z-index:999;border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);transition:transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
  white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes pinPop{
  0%{opacity:0;transform:scale(0) translateY(-20px)}
  65%{transform:scale(1.35) translateY(4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.pin-anim{animation:pinPop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards}

/* ===== 3D Map enhancements ===== */
.wShimmer1{animation:wShimmer 3s ease-in-out infinite;transform-origin:224px 259px}
.wShimmer2{animation:wShimmer 4.5s ease-in-out infinite 1.5s;transform-origin:258px 287px}
@keyframes wShimmer{0%,100%{opacity:.14}50%{opacity:.32}}
.fntStream{animation:fntPulse 2.5s ease-in-out infinite}
@keyframes fntPulse{0%,100%{opacity:.45}50%{opacity:.9}}
.blk.sel polygon:not(.top),.blk.sel rect:not(.top){opacity:.55}
</style>
</head>
<body>

<!-- スプラッシュ -->
<div id="splash">
  <div class="sp-bg"></div>
  <div class="sp-stars">
    <div class="sp-star"></div><div class="sp-star"></div>
    <div class="sp-star"></div><div class="sp-star"></div>
    <div class="sp-star"></div><div class="sp-star"></div>
    <div class="sp-star"></div><div class="sp-star"></div>
  </div>
  <div class="sp-horizon"></div>
  <div class="sp-firework"></div><div class="sp-firework"></div>
  <div class="sp-firework"></div><div class="sp-firework"></div>
  <div class="sp-firework"></div>
  <div class="sp-content">
    <div class="sp-deco">✦ UNIVERSAL STUDIOS JAPAN ✦</div>
    <div class="sp-badge">USJ</div>
    <div class="sp-divider">
      <div class="sp-divider-line"></div>
      <div class="sp-divider-icon">⭐</div>
      <div class="sp-divider-line r"></div>
    </div>
    <div class="sp-sub">待ち合わせナビ</div>
    <div class="sp-sub2">MEET-UP NAVIGATOR</div>
    <div class="sp-progress"><div class="sp-prog-fill"></div></div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="h-left">
      <div class="h-badge">USJ</div>
      <div class="h-title">
        <strong>待ち合わせナビ</strong>
        <span>エリアをタップして共有</span>
      </div>
    </div>
    <div class="h-pin">📍</div>
  </div>
</header>

<div class="map-wrap" id="mapWrap">
<canvas id="fx"></canvas>
<svg viewBox="-10 0 510 540" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="gGnd" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#2e5c34"/>
    <stop offset="65%" stop-color="#1a3d1e"/>
    <stop offset="100%" stop-color="#0d2010"/>
  </radialGradient>
  <radialGradient id="gLake" cx="38%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#a4daff"/>

  </radialGradient>
  <linearGradient id="gMin" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#ffe840"/><stop offset="55%" stop-color="#FFD700"/><stop offset="100%" stop-color="#cc7700"/></linearGradient>
  <linearGradient id="gSF"  x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#c8ffd0"/><stop offset="50%" stop-color="#43a047"/><stop offset="100%" stop-color="#1b5e20"/></linearGradient>
  <linearGradient id="gJur" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#deff8e"/><stop offset="50%" stop-color="#8bc34a"/><stop offset="100%" stop-color="#1b5e20"/></linearGradient>
  <linearGradient id="gAmi" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#b8eaff"/><stop offset="50%" stop-color="#29b6f6"/><stop offset="100%" stop-color="#01579b"/></linearGradient>
  <linearGradient id="gWW"  x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#b2ffff"/><stop offset="50%" stop-color="#26c6da"/><stop offset="100%" stop-color="#006064"/></linearGradient>
  <linearGradient id="gMar" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#ff9090"/><stop offset="50%" stop-color="#f44336"/><stop offset="100%" stop-color="#b71c1c"/></linearGradient>
  <linearGradient id="gHP"  x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#eab8ff"/><stop offset="50%" stop-color="#ab47bc"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
  <linearGradient id="gWL"  x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#ffb8d8"/><stop offset="50%" stop-color="#f06292"/><stop offset="100%" stop-color="#880e4f"/></linearGradient>
  <linearGradient id="gHW"  x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#ffff9a"/><stop offset="50%" stop-color="#ffd54f"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
  <linearGradient id="gNY"  x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#e8e0ff"/><stop offset="50%" stop-color="#7c6bc0"/><stop offset="100%" stop-color="#1a237e"/></linearGradient>
  <linearGradient id="gEnt" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#ffe090"/><stop offset="50%" stop-color="#ffa000"/><stop offset="100%" stop-color="#bf360c"/></linearGradient>
  <filter id="sh" x="-15%" y="-15%" width="140%" height="140%"><feDropShadow dx="1" dy="5" stdDeviation="5" flood-color="rgba(0,0,0,.65)"/></filter>
  <filter id="shB" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,.5)"/></filter>
</defs>

<!-- グラウンド -->
<ellipse cx="240" cy="295" rx="218" ry="238" fill="url(#gGnd)"/>
<ellipse cx="240" cy="295" rx="218" ry="238" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="2"/>

<!-- 環状道路（3D） -->
<ellipse cx="243" cy="295" rx="158" ry="168" fill="none" stroke="#1a0f00" stroke-width="26" opacity="0.55"/>
<ellipse cx="240" cy="288" rx="156" ry="166" fill="none" stroke="#6a5010" stroke-width="20" opacity="0.62"/>
<ellipse cx="240" cy="288" rx="156" ry="166" fill="none" stroke="#c8a030" stroke-width="12" opacity="0.36"/>
<ellipse cx="240" cy="288" rx="156" ry="166" fill="none" stroke="#f0d060" stroke-width="3.5" opacity="0.2" stroke-dasharray="14,10"/>
<ellipse cx="240" cy="288" rx="147" ry="157" fill="none" stroke="rgba(240,200,60,.12)" stroke-width="1.5"/>
<ellipse cx="240" cy="288" rx="165" ry="175" fill="none" stroke="rgba(240,200,60,.1)" stroke-width="1.5"/>

<!-- ラグーン（3D凹み） -->
<ellipse cx="244" cy="283" rx="115" ry="103" fill="#041e52" opacity="0.82"/>

let ca=null,cs=null,cm='';
let hintHidden=false;

// \u30D1\u30FC\u30C6\u30A3\u30AF\u30EB\u30A8\u30D5\u30A7\u30AF\u30C8
const canvas=document.getElementById('fx');
const ctx2=canvas.getContext('2d');
let particles=[];

function resizeCanvas(){
  const wrap=document.getElementById('mapWrap');
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.offsetHeight;
}
window.addEventListener('resize',resizeCanvas);
setTimeout(resizeCanvas,100);

function spawnParticles(x,y,color){
  const rect=document.getElementById('mapWrap').getBoundingClientRect();
  const svg=document.querySelector('.map-wrap svg');
  const vbW=460,vbH=545;
  const scaleX=rect.width/vbW;
  const scaleY=rect.height/vbH;
  const px=(x-15)*scaleX;
  const py=(y-10)*scaleY;
  for(let i=0;i<18;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1.5+Math.random()*3;
    particles.push({
      x:px,y:py,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      life:1,decay:0.03+Math.random()*0.02,
      r:2+Math.random()*4,
      color:color,
      emoji:['\u2B50','\u2728','\uD83C\uDF1F'][Math.floor(Math.random()*3)]
    });
  }
}

function animParticles(){
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.decay;
    if(p.life<=0)return false;
    ctx2.save();
    ctx2.globalAlpha=p.life;
    ctx2.font=`${p.r*3}px serif`;
    ctx2.fillText(p.emoji,p.x-p.r,p.y+p.r);
    ctx2.restore();
    return true;
  });
  requestAnimationFrame(animParticles);
}
animParticles();

function sel(el){
  document.querySelectorAll('.blk').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  const a=D[el.dataset.id];ca=a;cs=null;
  userEdited=false;isEditing=false;
  var msgEl=document.getElementById('msg');
  if(msgEl)msgEl.setAttribute('readonly','');
  var eBtn=document.getElementById('editBtn');
  if(eBtn){eBtn.innerHTML='&#x270F;&#xFE0F; \u7DE8\u96C6';eBtn.classList.remove('on');}

  if(!hintHidden){document.getElementById('hint').classList.add('hide');hintHidden=true;}

  // \u30D1\u30FC\u30C6\u30A3\u30AF\u30EB
  spawnParticles(a.cx,a.cy,a.color);

  // \u30D4\u30F3
  const pin=document.getElementById('pin');
  const r1=document.getElementById('pinRing1');
  const r2=document.getElementById('pinRing2');
  const txt=document.getElementById('pinTxt');
  pin.style.display='block';
  [r1,r2].forEach(e=>{e.setAttribute('cx',a.cx);e.setAttribute('cy',a.cy);});
  txt.setAttribute('x',a.cx);txt.setAttribute('y',a.cy-2);
  r1.setAttribute('stroke',a.color+'88');
  pin.classList.remove('pin-anim');void pin.offsetWidth;pin.classList.add('pin-anim');

  // \u30D1\u30CD\u30EB
  const banner=document.getElementById('pBanner');
  banner.style.setProperty('--ac',a.color);
  const ico=document.getElementById('pIco');
  ico.textContent=a.icon;
  ico.style.background=a.color+'20';
  ico.style.borderColor=a.color+'40';
  document.getElementById('pName').textContent=a.name;
  document.getElementById('pSub').textContent=a.sub;

  // \u30B9\u30DD\u30C3\u30C8
  const sp=document.getElementById('spots');sp.innerHTML='';
  a.spots.forEach(s=>{
    const b=document.createElement('button');b.className='spot';b.textContent=s;
    b.onclick=()=>{
      document.querySelectorAll('#spots .spot').forEach(x=>{
        x.classList.remove('on');x.style.background='';x.style.borderColor='';
      });
      b.classList.add('on');
      b.style.background=a.color+'25';
      b.style.borderColor=a.color;
      cs=s;upd();
    };
    sp.appendChild(b);
  });

  upd();
  const panel=document.getElementById('panel');panel.classList.add('show');
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),150);
  // 選択エリアをSVG内で最前面に移動（下に埋まるエリアの浮き上がり対策）
  const pinEl=document.getElementById('pin');
  if(pinEl&&pinEl.parentNode)pinEl.parentNode.insertBefore(el,pinEl);
}

let isEditing=false;
let userEdited=false;
const PKEY='\uD83D\uDCCC \u5F85\u3061\u5408\u308F\u305B\uFF1A';
const AKEY='\uD83D\uDDFA \u30A8\u30EA\u30A2\uFF1A';

function buildMsg(){
  if(!ca)return '';
  const now=new Date();
  const hm=now.getHours()+'\u6642'+('0'+now.getMinutes()).slice(-2)+'\u5206';
  const sp=cs?('\n'+PKEY+cs):'';
  return '\uD83D\uDCCD USJ\u3067\u5F85\u3063\u3066\u308B\u3088\uFF01\n\n'+AKEY+ca.name+sp+'\n\n\u23F0 '+hm+'\u73FE\u5728\n\n\u3053\u3053\u3067\u5F85\u3063\u3066\u308B\u306D\uFF01\u898B\u3064\u304B\u3089\u306A\u304B\u3063\u305F\u3089\u9023\u7D61\u3057\u3066\uFF5E\uD83D\uDE4C';
}

function upd(){
  if(!ca)return;
  var el=document.getElementById('msg');
  if(!userEdited){
    var base=buildMsg();
    el.value=base;cm=base;
  } else {
    var current=el.value;
    var PKEY='\uD83D\uDCCC \u5F85\u3061\u5408\u308F\u305B\uFF1A';
    var AKEY='\uD83D\uDDFA \u30A8\u30EA\u30A2\uFF1A';
    var spLine=cs?(PKEY+cs):'';
    var updated;
    if(current.indexOf(PKEY)>=0){
      if(cs){
        var idx=current.indexOf(PKEY);
        var end=current.indexOf('\n',idx);
        updated=current.substring(0,idx)+spLine+(end>=0?current.substring(end):'');
      } else {
        var idx2=current.indexOf('\n'+PKEY);
        var end2=current.indexOf('\n',idx2+1);
        updated=idx2>=0?current.substring(0,idx2)+(end2>=0?current.substring(end2):''):current;
      }
    } else {
      if(cs){
        var idx3=current.indexOf(AKEY);
        if(idx3>=0){
          var end3=current.indexOf('\n',idx3);
          updated=end3>=0?current.substring(0,end3)+'\n'+spLine+current.substring(end3):current+'\n'+spLine;
        } else {updated=current;}
      } else {updated=current;}
    }
    el.value=updated;cm=updated;
  }
}

function shareLine(){cm=document.getElementById('msg').value;if(cm)window.open('https://line.me/R/msg/text/?'+encodeURIComponent(cm),'_blank')}
function copyMsg(){
  if(!cm)return;
  cm=document.getElementById('msg').value;
  const done=()=>showToast('\uD83D\uDCCB \u30B3\u30D4\u30FC\u5B8C\u4E86\uFF01SNS\u306B\u8CBC\u308A\u4ED8\u3051\u3066\u306D\uD83D\uDE4C');
  if(navigator.clipboard){navigator.clipboard.writeText(cm).then(done).catch(()=>{fb();done();})}
  else{fb();done();}
}
function fb(){
  const t=document.createElement('textarea');t.value=cm;
  t.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(t);t.select();
  document.execCommand('copy');document.body.removeChild(t);
}

function toggleEdit(){
  var el=document.getElementById('msg');
  var btn=document.getElementById('editBtn');
  isEditing=!isEditing;
  if(isEditing){
    el.removeAttribute('readonly');el.focus();
    btn.innerHTML='&#x2705; \u5B8C\u4E86';btn.classList.add('on');
    el.oninput=function(){userEdited=true;};
  } else {
    el.setAttribute('readonly','');cm=el.value;
    btn.innerHTML='&#x270F;&#xFE0F; \u7DE8\u96C6';btn.classList.remove('on');
  }
}

function showToast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
